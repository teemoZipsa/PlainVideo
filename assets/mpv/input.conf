# PlainVideo interaction proof

# The whole video is the primary control surface.
MBTN_LEFT      script-binding plainvideo/toggle-pause
MBTN_LEFT_DBL  cycle fullscreen
Alt+MBTN_LEFT  begin-vo-dragging

# Right click is intentionally reserved for the embedded shell's future
# progressive-disclosure menu; Slice 0A does not expose a dead stock menu.

# Familiar playback controls.
SPACE       script-binding plainvideo/toggle-pause
LEFT        script-binding plainvideo/seek-back-small
RIGHT       script-binding plainvideo/seek-forward-small
Shift+LEFT  script-binding plainvideo/seek-back-large
Shift+RIGHT script-binding plainvideo/seek-forward-large
UP          script-binding plainvideo/volume-up
DOWN        script-binding plainvideo/volume-down
WHEEL_UP    script-binding plainvideo/volume-up
WHEEL_DOWN  script-binding plainvideo/volume-down
ENTER       cycle fullscreen
f           cycle fullscreen
ESC         set fullscreen no

# Useful actions stay available without permanent buttons.
s      screenshot
S      screenshot video
q      quit
Ctrl+q quit
