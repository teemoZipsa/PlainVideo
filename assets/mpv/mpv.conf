# PlainVideo embedded playback surface
# This directory is passed as mpv's isolated config directory, so user mpv
# settings and scripts cannot silently change the prototype.

# The Rust shell owns window creation, DPI, fullscreen, drag/drop, and input.
# It promotes force-window to immediate only after the render context exists.
force-window=no
idle=yes
background-color="#101010"
keepaspect=yes

# libmpv renders into the OpenGL target owned by PlainVideo's render thread.
vo=libmpv
gpu-api=opengl
hwdec=auto-safe

# Keep ordinary playback robust. Display sync and generated frames are later,
# separately measured features.
video-sync=audio
interpolation=no

# Local companion tracks should work without a settings screen.
autoload-files=yes
sub-auto=fuzzy
audio-file-auto=fuzzy
alang=ko,kor,korean,en,eng
slang=ko,kor,korean,en,eng

# PlainVideo draws only short-lived feedback. mpv's general-purpose OSC is
# intentionally disabled because it exposes controls this surface does not need.
osc=no
osd-bar=no
osd-on-seek=no
osd-duration=1200
osd-font=Segoe UI
osd-font-size=24
input-default-bindings=no
input-builtin-bindings=no
input-builtin-dragging=no

volume-max=100
keep-open=no
