# PlainVideo playback-surface proof
# This directory is passed as mpv's isolated config directory, so user mpv
# settings and scripts cannot silently change the prototype.

force-window=immediate
idle=once
border=no
title-bar=no
title=PlainVideo
window-corners=donotround
fs-screen=current
background-color="#101010"
keepaspect=yes
keepaspect-window=no
autofit-larger=92%x92%
auto-window-resize=yes
drag-and-drop=replace
cursor-autohide=1800

# Use the current mpv renderer and a conservative hardware-decoding fallback.
vo=gpu-next
gpu-api=auto
gpu-context=auto
hwdec=auto-safe

# Keep ordinary playback robust. Display sync and generated frames are later,
# separately measured features.
video-sync=audio
interpolation=no

# Local companion tracks should work without a settings screen.
autoload-files=yes
sub-auto=fuzzy
audio-file-auto=fuzzy
alang=ko,kor,korean,en,eng
slang=ko,kor,korean,en,eng

# PlainVideo draws only short-lived feedback. mpv's general-purpose OSC is
# intentionally disabled because it exposes controls this surface does not need.
osc=no
osd-bar=no
osd-on-seek=no
osd-duration=1200
osd-font=Segoe UI
osd-font-size=24
input-default-bindings=no
input-builtin-bindings=yes
input-builtin-dragging=yes
input-dragging-deadzone=4

volume-max=100
keep-open=no
